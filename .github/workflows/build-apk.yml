name: Build APK

on:
  push:
    branches: [ main, claude/3d-glb-kml-support-ytatt5 ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # Fresh install so npm resolves the platform-specific @tailwindcss/oxide
    # native binding for linux-x64. Works around npm optional-deps bug
    # (https://github.com/npm/cli/issues/4828) that caused
    # "Cannot find native binding" during vite build.
    - name: Install dependencies
      run: |
        rm -rf node_modules package-lock.json
        npm install

    - name: Build React app
      run: npm run build
      env:
        VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}
        VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
        VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
        VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
        VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}

    - name: Sync Capacitor
      run: npx cap sync

    - name: Build APK (debug)
      run: |
        cd android
        chmod +x gradlew
        ./gradlew assembleDebug
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: construction-site-manager-apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    # Publish the APK to a rolling "latest-apk" release so it has a permanent,
    # directly-downloadable URL (artifact links require login; release assets do not).
    - name: Publish APK to latest release
      if: success()
      uses: softprops/action-gh-release@v2
      with:
        tag_name: latest-apk
        name: Latest APK
        prerelease: true
        files: android/app/build/outputs/apk/debug/app-debug.apk
        body: |
          Latest automated debug APK build.
          Build #${{ github.run_number }} — commit ${{ github.sha }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    # Post the direct download link as a comment on the PR (or the commit).
    - name: Comment APK download link
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          const { owner, repo } = context.repo;
          const url = `https://github.com/${owner}/${repo}/releases/download/latest-apk/app-debug.apk`;
          const runUrl = `${process.env.GITHUB_SERVER_URL}/${owner}/${repo}/actions/runs/${context.runId}`;
          const body = [
            '✅ **APK build succeeded**',
            '',
            `📱 **[Download app-debug.apk](${url})** — tap on your Android phone to install.`,
            '',
            `Build #${{ github.run_number }} · commit \`${context.sha.substring(0, 7)}\` · [workflow run](${runUrl})`,
            '',
            '_If prompted, allow "Install unknown apps" for your browser to finish installing._'
          ].join('\n');

          if (context.eventName === 'pull_request') {
            await github.rest.issues.createComment({
              owner, repo, issue_number: context.issue.number, body,
            });
          } else {
            const branch = context.ref.replace('refs/heads/', '');
            const prs = await github.rest.pulls.list({
              owner, repo, state: 'open', head: `${owner}:${branch}`,
            });
            if (prs.data.length > 0) {
              for (const pr of prs.data) {
                await github.rest.issues.createComment({
                  owner, repo, issue_number: pr.number, body,
                });
              }
            } else {
              await github.rest.repos.createCommitComment({
                owner, repo, commit_sha: context.sha, body,
              });
            }
          }
