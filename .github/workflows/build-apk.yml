name: Build APK

on:
  push:
    branches: [ main, claude/3d-glb-kml-support-ytatt5 ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Retrieve secrets from Google Cloud Secret Manager
      id: secrets
      run: |
        echo "VITE_GOOGLE_MAPS_API_KEY=$(gcloud secrets versions access latest --secret='VITE_GOOGLE_MAPS_API_KEY')" >> $GITHUB_OUTPUT
        echo "VITE_FIREBASE_API_KEY=$(gcloud secrets versions access latest --secret='VITE_FIREBASE_API_KEY')" >> $GITHUB_OUTPUT
        echo "VITE_FIREBASE_AUTH_DOMAIN=$(gcloud secrets versions access latest --secret='VITE_FIREBASE_AUTH_DOMAIN')" >> $GITHUB_OUTPUT
        echo "VITE_FIREBASE_PROJECT_ID=$(gcloud secrets versions access latest --secret='VITE_FIREBASE_PROJECT_ID')" >> $GITHUB_OUTPUT
        echo "VITE_FIREBASE_STORAGE_BUCKET=$(gcloud secrets versions access latest --secret='VITE_FIREBASE_STORAGE_BUCKET')" >> $GITHUB_OUTPUT
        echo "VITE_FIREBASE_MESSAGING_SENDER_ID=$(gcloud secrets versions access latest --secret='VITE_FIREBASE_MESSAGING_SENDER_ID')" >> $GITHUB_OUTPUT
        echo "VITE_FIREBASE_APP_ID=$(gcloud secrets versions access latest --secret='VITE_FIREBASE_APP_ID')" >> $GITHUB_OUTPUT

    - name: Install dependencies
      run: npm ci

    - name: Build React app
      run: npm run build
      env:
        VITE_GOOGLE_MAPS_API_KEY: ${{ steps.secrets.outputs.VITE_GOOGLE_MAPS_API_KEY }}
        VITE_FIREBASE_API_KEY: ${{ steps.secrets.outputs.VITE_FIREBASE_API_KEY }}
        VITE_FIREBASE_AUTH_DOMAIN: ${{ steps.secrets.outputs.VITE_FIREBASE_AUTH_DOMAIN }}
        VITE_FIREBASE_PROJECT_ID: ${{ steps.secrets.outputs.VITE_FIREBASE_PROJECT_ID }}
        VITE_FIREBASE_STORAGE_BUCKET: ${{ steps.secrets.outputs.VITE_FIREBASE_STORAGE_BUCKET }}
        VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ steps.secrets.outputs.VITE_FIREBASE_MESSAGING_SENDER_ID }}
        VITE_FIREBASE_APP_ID: ${{ steps.secrets.outputs.VITE_FIREBASE_APP_ID }}

    - name: Sync Capacitor
      run: npx cap sync

    - name: Build APK (debug)
      run: cd android && ./gradlew assembleDebug
      env:
        ANDROID_HOME: ${{ env.ANDROID_HOME }}

    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      if: success()
      with:
        name: construction-site-manager-debug.apk
        path: android/app/build/outputs/apk/debug/app-debug.apk
        retention-days: 30

    - name: Create Release (on version tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: android/app/build/outputs/apk/debug/app-debug.apk
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Slack Notification (on failure)
      if: failure()
      uses: slackapi/slack-github-action@v1
      with:
        payload: |
          {
            "text": "❌ Construction Site Manager APK build failed",
            "blocks": [
              {
                "type": "section",
                "text": {
                  "type": "mrkdwn",
                  "text": "*APK Build Failed*\nBranch: ${{ github.ref }}\nCommit: ${{ github.sha }}\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View logs>"
                }
              }
            ]
          }
      env:
        SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
